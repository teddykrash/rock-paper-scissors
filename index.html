<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="index.js" defer></script>
</head>
<body>
    <div class="game-container">
        <header>
            <h1>ROCK PAPER SCISSORS</h1>
            <p class="subtitle">Choose your weapon</p>
        </header>

        <div class="buttons-container">
            <button id="rockBtn" class="game-btn">Rock</button>
            <button id="paperBtn" class="game-btn">Paper</button>
            <button id="scissorsBtn" class="game-btn">Scissors</button>
            <button id="resetBtn" class="game-btn">Reset</button>
        </div>

        <div class="arena">
            <div class="player-side">
                <h3>You</h3>
                <div id="playerChoice" class="choice-display">?</div>
            </div>
            <div class="vs">VS</div>
            <div class="computer-side">
                <h3>Computer</h3>
                <div id="computerChoice" class="choice-display">?</div>
            </div>
        </div>

        <div id="result" class="result-display">Make your move!</div>

        <div class="scoreboard">
            <div class="score-item wins">
                <span class="score-label">WINS</span>
                <span id="wins" class="score-number">0</span>
            </div>
            <div class="score-item losses">
                <span class="score-label">LOSSES</span>
                <span id="losses" class="score-number">0</span>
            </div>
            <div class="score-item ties">
                <span class="score-label">TIES</span>
                <span id="ties" class="score-number">0</span>
            </div>
        </div>
    </div>
</body>
</html>
